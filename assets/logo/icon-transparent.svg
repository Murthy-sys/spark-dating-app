<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <defs>
    <linearGradient id="gtr" x1="0" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FF1464"/>
      <stop offset="55%"  stop-color="#FF4B7E"/>
      <stop offset="100%" stop-color="#FF8FAB"/>
    </linearGradient>
    <!-- Tight crisp glow -->
    <filter id="glowtr" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"   result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Wide ambient glow -->
    <filter id="ambtr" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.2 0 0 0
                0 0 0.3 0 0
                0 0 0 0.6 0" result="tinted"/>
      <feMerge>
        <feMergeNode in="tinted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow -->
    <filter id="shadowtr" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF1464" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <polygon points="60.08,19.76 68.72,19.76 52.88,50.00 60.80,50.00 39.92,80.24 31.28,80.24 47.12,50.00 39.20,50.00" fill="url(#gtr)" opacity="0.35" filter="url(#ambtr)" />
  <!-- Main bolt + crisp glow -->
  <polygon points="60.08,19.76 68.72,19.76 52.88,50.00 60.80,50.00 39.92,80.24 31.28,80.24 47.12,50.00 39.20,50.00" fill="url(#gtr)" filter="url(#glowtr)" />
  <!-- White highlight on upper-left face -->
  <polygon points="39.20,50.00 60.08,19.76 68.72,19.76 52.88,50.00" fill="white" opacity="0.18" />
  <!-- Edge shimmer line -->
  <polygon points="60.08,19.76 68.72,19.76 52.88,50.00 60.80,50.00 39.92,80.24 31.28,80.24 47.12,50.00 39.20,50.00" fill="none" stroke="white" stroke-width="0.6" opacity="0.12" />
</svg>