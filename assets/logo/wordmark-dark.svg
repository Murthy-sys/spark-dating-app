<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">

  <defs>
    <linearGradient id="gwdk" x1="0" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FF1464"/>
      <stop offset="55%"  stop-color="#FF4B7E"/>
      <stop offset="100%" stop-color="#FF8FAB"/>
    </linearGradient>
    <!-- Tight crisp glow -->
    <filter id="glowwdk" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"   result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Wide ambient glow -->
    <filter id="ambwdk" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.2 0 0 0
                0 0 0.3 0 0
                0 0 0 0.6 0" result="tinted"/>
      <feMerge>
        <feMergeNode in="tinted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow -->
    <filter id="shadowwdk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF1464" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="280" height="80" fill="#0D0918"/>
  <!-- Bolt icon at left -->
  <g clip-path="none">

  <!-- Ambient glow -->
  <polygon points="46.12,15.64 53.08,15.64 40.32,40.00 46.70,40.00 29.88,64.36 22.92,64.36 35.68,40.00 29.30,40.00" fill="url(#gwdk)" opacity="0.35" filter="url(#ambwdk)" />
  <!-- Main bolt + crisp glow -->
  <polygon points="46.12,15.64 53.08,15.64 40.32,40.00 46.70,40.00 29.88,64.36 22.92,64.36 35.68,40.00 29.30,40.00" fill="url(#gwdk)" filter="url(#glowwdk)" />
  <!-- White highlight on upper-left face -->
  <polygon points="29.30,40.00 46.12,15.64 53.08,15.64 40.32,40.00" fill="white" opacity="0.18" />
  <!-- Edge shimmer line -->
  <polygon points="46.12,15.64 53.08,15.64 40.32,40.00 46.70,40.00 29.88,64.36 22.92,64.36 35.68,40.00 29.30,40.00" fill="none" stroke="white" stroke-width="0.6" opacity="0.12" />
  </g>
  <!-- "SPARK" wordmark -->
  <text x="76" y="50"
    font-family="Inter, SF Pro Display, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="800" letter-spacing="5"
    fill="url(#gwdk)">SPARK</text>
  <!-- Tagline -->
  <text x="77" y="66"
    font-family="Inter, SF Pro Display, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="8.5" font-weight="400" letter-spacing="2.5"
    fill="rgba(255,255,255,0.38)">CROSS PATHS. MAKE A SPARK.</text>
</svg>